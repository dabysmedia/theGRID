name: Google Health sync

# Pulls Fitbit/Google Health steps + sleep into theGRID every 15 minutes.
# Requires repo secrets:
#   APP_URL      e.g. https://itslos.com
#   CRON_SECRET  same value as Railway CRON_SECRET

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync Google Health
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Missing APP_URL or CRON_SECRET secrets — skipping."
            exit 0
          fi
          BASE="${APP_URL%/}"
          # Prefer query secret (works even when Authorization headers are stripped)
          HTTP_CODE=$(curl -sS -o /tmp/gh-sync.json -w "%{http_code}" -X POST \
            "${BASE}/api/google-health/cron?days=3&secret=${CRON_SECRET}")
          echo "HTTP ${HTTP_CODE}"
          cat /tmp/gh-sync.json
          echo
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Cron endpoint returned HTTP ${HTTP_CODE}"
            exit 1
          fi
          if grep -q '"error"' /tmp/gh-sync.json && ! grep -Eq '"success"[[:space:]]*:[[:space:]]*true|"ok"[[:space:]]*:[[:space:]]*[1-9]' /tmp/gh-sync.json; then
            exit 1
          fi
