<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">THE GRID app icon</title>
  <desc id="desc">Dark full-bleed iPhone app icon with a subtle grid and a large neon segmented activity ring forming a stylized G.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#161C21"/>
      <stop offset="100%" stop-color="#090D11"/>
    </linearGradient>

    <linearGradient id="ringA" x1="220" y1="220" x2="804" y2="804" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C9E51A"/>
      <stop offset="100%" stop-color="#5DDC7A"/>
    </linearGradient>

    <linearGradient id="ringB" x1="220" y1="220" x2="804" y2="804" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#37E4F4"/>
      <stop offset="100%" stop-color="#6E63FF"/>
    </linearGradient>

    <radialGradient id="vignette" cx="512" cy="430" r="740" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1D2A2D" stop-opacity=".24"/>
      <stop offset="68%" stop-color="#000000" stop-opacity=".03"/>
      <stop offset="100%" stop-color="#000000" stop-opacity=".36"/>
    </radialGradient>

    <pattern id="grid" width="72" height="72" patternUnits="userSpaceOnUse">
      <path d="M 72 0 L 0 0 0 72" fill="none" stroke="#8FA0AA" stroke-opacity=".12" stroke-width="2"/>
    </pattern>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Full-bleed square — iOS applies its own squircle mask -->
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="url(#grid)"/>
  <rect width="1024" height="1024" fill="url(#vignette)"/>

  <!-- segmented activity ring (~1.7× original mark) -->
  <g transform="rotate(-90 512 512)" fill="none" stroke-linecap="round" filter="url(#glow)">
    <circle cx="512" cy="512" r="404" stroke="#212A30" stroke-width="92"/>
    <circle cx="512" cy="512" r="404" stroke="url(#ringA)" stroke-width="92"
            stroke-dasharray="1394 1150" stroke-dashoffset="68"/>
    <circle cx="512" cy="512" r="404" stroke="url(#ringB)" stroke-width="92"
            stroke-dasharray="434 2110" stroke-dashoffset="-1692"/>
  </g>

  <!-- stylized G (coordinates pre-scaled ~1.7× around center) -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <path d="M 724.5 318.2
             C 666.7 240.0 583.4 195.8 491.6 195.8
             C 316.5 195.8 175.4 338.6 175.4 513.7
             C 175.4 690.5 316.5 831.6 491.6 831.6
             C 641.2 831.6 755.1 741.5 789.1 619.1"
          stroke="#F0F4F3" stroke-width="64"/>
    <!-- stem uses a 2D path so gradient strokes resolve reliably -->
    <path d="M 510.3 554.5 L 811.2 554.5 L 811.2 744.9"
          stroke="url(#ringA)" stroke-width="64"/>
  </g>

  <!-- four subtle grid nodes -->
  <g fill="#C9E51A">
    <circle cx="118" cy="118" r="15" opacity=".72"/>
    <circle cx="906" cy="118" r="15" opacity=".30"/>
    <circle cx="118" cy="906" r="15" opacity=".30"/>
    <circle cx="906" cy="906" r="15" opacity=".72"/>
  </g>
</svg>
