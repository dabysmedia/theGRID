<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">THE GRID app icon</title>
  <desc id="desc">Minimal dark iPhone app icon with a subtle grid and a neon segmented activity ring forming a stylized G.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#161C21"/>
      <stop offset="100%" stop-color="#090D11"/>
    </linearGradient>

    <linearGradient id="ringA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C9E51A"/>
      <stop offset="100%" stop-color="#5DDC7A"/>
    </linearGradient>

    <linearGradient id="ringB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#37E4F4"/>
      <stop offset="100%" stop-color="#6E63FF"/>
    </linearGradient>

    <pattern id="grid" width="96" height="96" patternUnits="userSpaceOnUse">
      <path d="M 96 0 L 0 0 0 96" fill="none" stroke="#8FA0AA" stroke-opacity=".10" stroke-width="2"/>
    </pattern>

    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity=".45"/>
    </filter>

    <clipPath id="iconClip">
      <rect x="32" y="32" width="960" height="960" rx="228"/>
    </clipPath>
  </defs>

  <g clip-path="url(#iconClip)">
    <rect x="32" y="32" width="960" height="960" rx="228" fill="url(#bg)"/>
    <rect x="32" y="32" width="960" height="960" fill="url(#grid)"/>

    <!-- soft vignette -->
    <radialGradient id="vignette" cx="50%" cy="42%" r="72%">
      <stop offset="0%" stop-color="#1D2A2D" stop-opacity=".20"/>
      <stop offset="72%" stop-color="#000000" stop-opacity=".05"/>
      <stop offset="100%" stop-color="#000000" stop-opacity=".42"/>
    </radialGradient>
    <rect x="32" y="32" width="960" height="960" fill="url(#vignette)"/>

    <!-- inner plate -->
    <rect x="126" y="126" width="772" height="772" rx="182"
          fill="#10161B" fill-opacity=".70"
          stroke="#9CA9B0" stroke-opacity=".11" stroke-width="3"
          filter="url(#softShadow)"/>

    <!-- segmented outer activity ring -->
    <g transform="rotate(-90 512 512)" fill="none" stroke-linecap="round" filter="url(#glow)">
      <circle cx="512" cy="512" r="238" stroke="#212A30" stroke-width="54"/>
      <circle cx="512" cy="512" r="238" stroke="url(#ringA)" stroke-width="54"
              stroke-dasharray="820 676" stroke-dashoffset="40"/>
      <circle cx="512" cy="512" r="238" stroke="url(#ringB)" stroke-width="54"
              stroke-dasharray="255 1241" stroke-dashoffset="-995"/>
    </g>

    <!-- stylized G / dashboard glyph -->
    <g fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 637 398
               C 603 352 554 326 500 326
               C 397 326 314 410 314 513
               C 314 617 397 700 500 700
               C 588 700 655 647 675 575"
            stroke="#F0F4F3" stroke-width="38"/>
      <path d="M 511 537 H 688" stroke="url(#ringA)" stroke-width="38" filter="url(#glow)"/>
      <path d="M 688 537 V 649" stroke="url(#ringA)" stroke-width="38" filter="url(#glow)"/>
    </g>

    <!-- four subtle grid nodes -->
    <g fill="#C9E51A">
      <circle cx="262" cy="262" r="10" opacity=".78"/>
      <circle cx="762" cy="262" r="10" opacity=".32"/>
      <circle cx="262" cy="762" r="10" opacity=".32"/>
      <circle cx="762" cy="762" r="10" opacity=".78"/>
    </g>

    <!-- tiny wordmark -->
    <text x="512" y="842" text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif"
          font-size="42" font-weight="700"
          letter-spacing="15"
          fill="#DCE5E2" fill-opacity=".78">GRID</text>
  </g>

  <!-- iOS-style edge -->
  <rect x="32" y="32" width="960" height="960" rx="228"
        fill="none" stroke="#E8F0EE" stroke-opacity=".12" stroke-width="4"/>
</svg>
